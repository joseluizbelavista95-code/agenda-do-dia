<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda Produtiva</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#0f172a;color:#fff}
header{background:#1e293b;padding:15px;display:flex;justify-content:space-between;align-items:center}
.menu-btn{font-size:28px;cursor:pointer}
.container{max-width:700px;margin:auto;padding:20px}
.stats{display:flex;gap:10px;margin-bottom:15px}
.stat-box{flex:1;background:#1e293b;padding:12px;border-radius:10px;text-align:center}
.progress-card,.task{background:#1e293b;border-radius:12px}
.progress-card{padding:20px;margin-bottom:15px}
.progress-bar{height:25px;background:#334155;border-radius:20px;overflow:hidden;margin-top:10px}
.progress{height:100%;width:0;background:#22c55e;transition:.3s}
.task{padding:15px;margin-bottom:10px;cursor:pointer;border:2px solid transparent}
.task.completed{background:#14532d;border-color:#22c55e}
.status{text-align:center;margin-top:10px;font-weight:bold}
.sidebar{position:fixed;top:0;left:-360px;width:360px;height:100%;background:#111827;padding:20px;transition:.3s;overflow:auto;z-index:999}
.sidebar.open{left:0}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none}
.overlay.show{display:block}
input{width:100%;padding:10px;margin:6px 0;border:none;border-radius:6px}
button{width:100%;padding:10px;border:none;border-radius:6px;cursor:pointer}
.add-btn{background:#22c55e;color:#fff}
.activity-item{background:#1f2937;padding:10px;border-radius:8px;margin-top:8px;display:flex;justify-content:space-between;align-items:center}
.delete-btn{background:#dc2626;color:#fff;width:auto;padding:5px 10px}
.info{background:#1e293b;padding:10px;border-radius:8px;margin:10px 0;text-align:center}
</style>
</head>
<body>

<div id="overlay" class="overlay" onclick="toggleMenu()"></div>

<div id="sidebar" class="sidebar">
<h2>⚙️ Configurações</h2>

<div class="info">
Total configurado: <span id="configuredPoints">0</span>/10
<br>
Pontos disponíveis: <span id="remainingPoints">0</span>
</div>

<input id="activityName" placeholder="Nome da atividade">
<input id="activityPoints" type="number" step="0.5" placeholder="Pontos">

<button class="add-btn" onclick="addActivity()">Adicionar atividade</button>

<hr style="margin:15px 0">

<div id="activityListConfig"></div>
</div>

<header>
<h2>🚀 Agenda Produtiva</h2>
<div class="menu-btn" onclick="toggleMenu()">☰</div>
</header>

<div class="container">

<div class="stats">
<div class="stat-box">📅<br><span id="todayDate"></span></div>
<div class="stat-box">🔥<br><span id="streak">0</span></div>
<div class="stat-box">🏆<br><span id="record">0</span></div>
</div>

<div class="progress-card">
<h3>Progresso do Dia</h3>
<div class="progress-bar"><div id="progressBar" class="progress"></div></div>
<div style="margin-top:10px"><span id="score">0</span>/10 pontos</div>
<div id="status" class="status">Comece o dia!</div>
</div>

<div id="tasksContainer"></div>

</div>

<script>
const META_MINIMA = 7;
const META_MAXIMA = 10;

let tasks = JSON.parse(localStorage.getItem("tasks")) || [
{name:"Arrumar a casa",points:0.5},
{name:"Dormir 7 horas",points:1},
{name:"Trabalhar 6 horas",points:2},
{name:"Academia",points:1.5},
{name:"Alimentação saudável",points:1},
{name:"Seguir gerenciamento",points:2},
{name:"Ler 10 páginas",points:1},
{name:"Estudar",points:1}
];

let completed = JSON.parse(localStorage.getItem("completed")) || [];

function toggleMenu(){
document.getElementById("sidebar").classList.toggle("open");
document.getElementById("overlay").classList.toggle("show");
}

document.getElementById("todayDate").innerText =
new Date().toLocaleDateString("pt-BR");

let streak = Number(localStorage.getItem("streak")) || 0;
let record = Number(localStorage.getItem("record")) || 0;

const currentDay = new Date().toDateString();
const lastDay = localStorage.getItem("savedDay");

if(lastDay && lastDay !== currentDay){
let yesterdayScore = Number(localStorage.getItem("lastScore")) || 0;

if(yesterdayScore >= META_MINIMA){
streak++;
if(streak > record) record = streak;
}else{
streak = 0;
}

localStorage.setItem("streak",streak);
localStorage.setItem("record",record);

completed = [];
localStorage.setItem("completed",JSON.stringify([]));
}

localStorage.setItem("savedDay",currentDay);

document.getElementById("streak").innerText = streak;
document.getElementById("record").innerText = record;

function saveTasks(){
localStorage.setItem("tasks",JSON.stringify(tasks));
}

function getConfiguredPoints(){
return tasks.reduce((a,b)=>a+Number(b.points),0);
}

function addActivity(){
const name = document.getElementById("activityName").value.trim();
const points = Number(document.getElementById("activityPoints").value);

if(!name || !points){
alert("Preencha todos os campos.");
return;
}

if(getConfiguredPoints() + points > 10){
alert("A soma total não pode ultrapassar 10 pontos.");
return;
}

tasks.push({name,points});
saveTasks();
render();

document.getElementById("activityName").value="";
document.getElementById("activityPoints").value="";
}

function deleteActivity(index){
if(!confirm("Excluir atividade?")) return;

tasks.splice(index,1);
completed = completed.filter(i => i !== index);

saveTasks();
localStorage.setItem("completed",JSON.stringify(completed));
render();
}

function toggleTask(index){
if(completed.includes(index)){
completed = completed.filter(i => i !== index);
}else{
completed.push(index);
}

localStorage.setItem("completed",JSON.stringify(completed));
renderProgress();
renderTasks();
}

function renderTasks(){
const container = document.getElementById("tasksContainer");
container.innerHTML="";

tasks.forEach((task,index)=>{
const div = document.createElement("div");
div.className = "task";

if(completed.includes(index)){
div.classList.add("completed");
}

div.innerHTML = task.name;
div.onclick = ()=>toggleTask(index);
container.appendChild(div);
});
}

function renderConfig(){
const list = document.getElementById("activityListConfig");
list.innerHTML="";

tasks.forEach((task,index)=>{
list.innerHTML += `
<div class="activity-item">
<div>
<strong>${task.name}</strong><br>
${task.points} pts
</div>
<button class="delete-btn" onclick="deleteActivity(${index})">❌</button>
</div>`;
});

const total = getConfiguredPoints();

document.getElementById("configuredPoints").innerText = total.toFixed(1);
document.getElementById("remainingPoints").innerText = (10-total).toFixed(1);
}

function renderProgress(){
let score = 0;

completed.forEach(i=>{
if(tasks[i]) score += Number(tasks[i].points);
});

localStorage.setItem("lastScore",score);

document.getElementById("score").innerText = score.toFixed(1);
document.getElementById("progressBar").style.width = ((score/10)*100)+"%";

const status = document.getElementById("status");

if(score >= 10){
status.innerText = "🔥 Dia Perfeito!";
}else if(score >= 7){
status.innerText = "✅ Meta atingida!";
}else{
status.innerText = "🚀 Continue avançando";
}
}

function render(){
renderTasks();
renderConfig();
renderProgress();
}

render();
</script>
</body>
</html>
